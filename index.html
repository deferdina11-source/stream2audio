<script>
const BASE_URL = window.location.origin;

// CONVERT
async function convert() {

    const value = input.value.trim();

    if (!selectedUrl && !value.includes("youtube")) {
        alert("Select result or paste valid URL");
        return;
    }

    const url = selectedUrl || value;

    await loadInfo(url);

    progress.style.display = 'block';

    let p = 0;

    const fake = setInterval(() => {
        p = Math.min(p + 10, 90);
        bar.style.width = p + '%';
        percent.textContent = p + '%';
    }, 300);

    const res = await fetch('/api/convert', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({url})
    });

    const data = await res.json();

    clearInterval(fake);

    bar.style.width = '100%';
    percent.textContent = '100%';

    // 🔥 FIXED DOWNLOAD LINK
    const downloadUrl = `${BASE_URL}/api/download/${data.file_id}`;

    download.innerHTML = `
        <button onclick="window.location.href='${downloadUrl}'">
            Download MP3
        </button>
    `;
}
</script>
