<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yt → mp3</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    width: 90%;
    max-width: 400px;
    text-align: center;
}
input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    margin-bottom: 15px;
}
button {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: red;
    color: white;
    cursor: pointer;
}
.progress {
    margin-top: 20px;
    height: 6px;
    background: #333;
}
.bar {
    height: 100%;
    width: 0%;
    background: red;
}
.spinner {
    margin-top: 20px;
    display: none;
}
.error {
    color: red;
}
</style>
</head>

<body>

<div class="container">
    <h1>yt → mp3</h1>

    <input id="url" placeholder="Paste YouTube link">
    <button id="btn">Convert</button>

    <div class="spinner" id="spinner">Loading...</div>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <div class="error" id="error"></div>
</div>

<script>
const btn = document.getElementById("btn");
const spinner = document.getElementById("spinner");
const bar = document.getElementById("bar");
const error = document.getElementById("error");

btn.onclick = async () => {

    const url = document.getElementById("url").value.trim();
    error.innerText = "";

    if (!url) {
        error.innerText = "Enter URL";
        return;
    }

    spinner.style.display = "block";
    bar.style.width = "20%";

    try {
        const res = await fetch("/api/convert", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ url })
        });

        if (!res.ok) {
            const text = await res.text();
            throw new Error(text);
        }

        const data = await res.json();

        if (!data.file_id) {
            throw new Error("Conversion failed");
        }

        bar.style.width = "80%";

        const downloadUrl = `${window.location.origin}/api/download/${data.file_id}`;

        const a = document.createElement("a");
        a.href = downloadUrl;
        a.download = "audio.mp3";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        bar.style.width = "100%";

    } catch (e) {
        error.innerText = e.message;
    }

    spinner.style.display = "none";
};
</script>

</body>
</html>
