<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yt → mp3</title>

<style>
body {
    background:#0e0e0e;
    color:#fff;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app {
    width:100%;
    max-width:400px;
}

input {
    width:100%;
    padding:12px;
    margin-bottom:10px;
    background:#1a1a1a;
    border:1px solid #333;
    color:#fff;
}

button {
    width:100%;
    padding:12px;
    background:red;
    border:none;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.result {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.result:hover {
    background:#222;
}

.progress {
    margin-top:20px;
}

.bar {
    height:6px;
    background:#333;
}

.bar-inner {
    height:6px;
    background:red;
    width:0%;
}

.spinner {
    margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<input id="input" placeholder="Paste link or search artist/song">

<div id="results"></div>

<button id="convert">Convert</button>

<div class="progress" id="progress" style="display:none;">
    <div class="bar">
        <div class="bar-inner" id="bar"></div>
    </div>
    <div id="percent">0%</div>
    <div class="spinner">⏳ Converting...</div>
</div>

<div id="download"></div>

</div>

<script>
let selectedUrl = null;
let timer = null;
let loading = false;

const input = document.getElementById('input');
const results = document.getElementById('results');
const convertBtn = document.getElementById('convert');
const progress = document.getElementById('progress');
const bar = document.getElementById('bar');
const percent = document.getElementById('percent');
const download = document.getElementById('download');

// --- SEARCH ---
input.addEventListener('input', () => {

    if (loading) return;

    clearTimeout(timer);

    const value = input.value.trim();

    if (!value) {
        results.innerHTML = '';
        return;
    }

    // If URL → skip search
    if (value.includes("youtube.com") || value.includes("youtu.be")) {
        selectedUrl = value;
        results.innerHTML = '';
        return;
    }

    timer = setTimeout(async () => {

        const res = await fetch('/api/search', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({query:value})
        });

        const data = await res.json();

        results.innerHTML = '';

        data.forEach(v => {
            const div = document.createElement('div');
            div.className = 'result';
            div.textContent = v.title;

            div.onclick = () => {
                selectedUrl = v.webpage_url;
                input.value = v.title;
                results.innerHTML = '';
            };

            results.appendChild(div);
        });

    }, 400);
});

// --- CONVERT ---
convertBtn.onclick = async () => {

    if (loading) return;

    const value = input.value.trim();

    if (!value && !selectedUrl) {
        alert('Enter URL or search');
        return;
    }

    const url = selectedUrl || value;

    loading = true;
    progress.style.display = 'block';

    let p = 0;

    const fake = setInterval(() => {
        p = Math.min(p + Math.random()*10, 90);
        bar.style.width = p + '%';
        percent.textContent = Math.floor(p) + '%';
    }, 400);

    try {

        const res = await fetch('/api/convert', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({url:url, quality:192})
        });

        const data = await res.json();

        clearInterval(fake);

        bar.style.width = '100%';
        percent.textContent = '100%';

        download.innerHTML = `
            <a href="/api/download/${data.file_id}">
                <button>Download MP3</button>
            </a>
        `;

    } catch (e) {
        alert('Error');
    }

    loading = false;
};
</script>

</body>
</html>
