<script>
let state = 'idle';
let url = '';
let quality = 192;
let videoInfo = null;
let fileId = null;
let progress = 0;
let errorMsg = '';
let showQualityPicker = false;
let showDonate = false;
let progressInterval = null;

let isProcessing = false;

// --- HELPERS ---
function extractVideoId(u) {
    const patterns = [
        /(?:youtube\.com\/watch\?v=)([^&\s]+)/,
        /(?:youtu\.be\/)([^?\s]+)/,
    ];
    for (const p of patterns) {
        const m = u.match(p);
        if (m) return m[1];
    }
    return null;
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

// --- API ---
async function fetchConvert(videoUrl, q) {
    const res = await fetch('/api/convert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: videoUrl, quality: q }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || data.detail);
    return data;
}

// --- MAIN FIX ---
async function handleConvert() {
    if (isProcessing) return; // 🔒 LOCK

    const vid = extractVideoId(url);
    if (!vid) {
        errorMsg = 'Enter a valid YouTube URL';
        state = 'error';
        render();
        return;
    }

    isProcessing = true;
    state = 'loading';
    progress = 0;
    render(); // 🔥 ONLY render once

    // progress loop (NO render inside)
    progressInterval = setInterval(() => {
        progress = Math.min(progress + Math.random() * 5 + 2, 90);

        const bar = document.getElementById('prog-bar');
        const pct = document.getElementById('prog-pct');

        if (bar) bar.style.width = progress + '%';
        if (pct) pct.textContent = Math.round(progress) + '%';

    }, 400);

    try {
        const result = await fetchConvert(url, quality);

        clearInterval(progressInterval);
        progress = 100;

        fileId = result.file_id;
        state = 'done';

    } catch (e) {
        clearInterval(progressInterval);
        state = 'error';
        errorMsg = e.message;
    }

    isProcessing = false;
    render();
}

function handleReset() {
    if (state === 'loading') return;

    url = '';
    state = 'idle';
    fileId = null;
    errorMsg = '';
    progress = 0;
    render();
}

async function handlePaste() {
    try {
        const text = await navigator.clipboard.readText();
        url = text;
        render();
    } catch {}
}

// --- RENDER ---
function render() {

    let html = `
    <div>
        <input id="url-input" value="${escapeHtml(url)}" placeholder="Paste YouTube link">
        <button onclick="handleConvert()">Convert</button>
    </div>
    `;

    if (state === 'loading') {
        html += `
        <div>
            <div style="width:100%;height:6px;background:#222;border-radius:4px;">
                <div id="prog-bar" style="height:100%;width:${progress}%;background:red"></div>
            </div>
            <div id="prog-pct">${Math.round(progress)}%</div>

            <div style="margin-top:10px;">
                <div class="spinner"></div>
            </div>
        </div>`;
    }

    if (state === 'done') {
        html += `
        <a href="/api/download/${fileId}" download>Download MP3</a>
        <button onclick="handleReset()">New</button>`;
    }

    if (state === 'error') {
        html += `<div style="color:red">${escapeHtml(errorMsg)}</div>`;
    }

    document.getElementById('app').innerHTML = html;

    const input = document.getElementById('url-input');

    if (input) {
        input.addEventListener('input', (e) => {
            if (state === 'loading') return; // 🔒 prevents flicker

            url = e.target.value;

            if (state === 'error') {
                state = 'idle';
                errorMsg = '';
            }

            render();
        });
    }
}

// INIT
render();
</script>
