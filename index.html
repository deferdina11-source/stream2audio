<script>
let state = 'idle';
let url = '';
let quality = 192;
let videoInfo = null;
let fileId = null;
let progress = 0;
let errorMsg = '';
let showQualityPicker = false;
let showDonate = false;
let progressInterval = null;

let isProcessing = false;
let inputTimer = null;

// --- HELPERS ---
function isYouTubeUrl(value) {
    return value.includes("youtube.com") || value.includes("youtu.be");
}

function extractVideoId(u) {
    const patterns = [
        /(?:youtube\.com\/watch\?v=)([^&\s]+)/,
        /(?:youtu\.be\/)([^?\s]+)/,
        /(?:youtube\.com\/embed\/)([^?\s]+)/,
        /(?:youtube\.com\/shorts\/)([^?\s]+)/,
    ];
    for (const p of patterns) {
        const m = u.match(p);
        if (m) return m[1];
    }
    return null;
}

function formatDuration(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${String(sec).padStart(2, '0')}`;
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

// --- API ---
async function fetchInfo(videoUrl) {
    const res = await fetch('/api/info', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: videoUrl }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || data.detail);
    return data;
}

async function fetchConvert(videoUrl, q) {
    const res = await fetch('/api/convert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: videoUrl, quality: q }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || data.detail);
    return data;
}

// --- CORE FIX: DEBOUNCED INPUT ---
function handleInput(value) {
    url = value;

    if (state === 'error') {
        state = 'idle';
        errorMsg = '';
    }

    clearTimeout(inputTimer);

    inputTimer = setTimeout(async () => {
        if (!url) return;

        // Only fetch info if it's a real URL
        if (isYouTubeUrl(url)) {
            try {
                const info = await fetchInfo(url);
                videoInfo = info;
                render();
            } catch {}
        }
    }, 400);
}

// --- FIX: LOCK CONVERT ---
async function handleConvert() {
    if (isProcessing) return;

    const vid = extractVideoId(url);
    if (!vid) {
        errorMsg = 'Enter a valid YouTube URL';
        state = 'error';
        render();
        return;
    }

    isProcessing = true;
    state = 'loading';
    progress = 0;
    render();

    progressInterval = setInterval(() => {
        progress = Math.min(progress + Math.random() * 6 + 2, 90);

        const bar = document.getElementById('prog-bar');
        const pct = document.getElementById('prog-pct');

        if (bar) bar.style.width = progress + '%';
        if (pct) pct.textContent = Math.round(progress) + '%';
    }, 400);

    try {
        const result = await fetchConvert(url, quality);

        clearInterval(progressInterval);
        progress = 100;

        fileId = result.file_id;
        videoInfo = {
            ...videoInfo,
            size_mb: result.size_mb
        };

        state = 'done';
    } catch (e) {
        clearInterval(progressInterval);
        state = 'error';
        errorMsg = e.message;
    }

    isProcessing = false;
    render();
}

// --- RESET ---
function handleReset() {
    url = '';
    state = 'idle';
    videoInfo = null;
    fileId = null;
    errorMsg = '';
    progress = 0;
    render();
}

// --- PASTE ---
async function handlePaste() {
    try {
        const text = await navigator.clipboard.readText();
        url = text;
        render();
    } catch {}
}

// --- RENDER ---
function render() {
    const vid = extractVideoId(url);
    const thumb = vid ? `https://img.youtube.com/vi/${vid}/mqdefault.jpg` : null;

    let html = `
    <input id="url-input" value="${escapeHtml(url)}" placeholder="Paste link or search">
    <button onclick="handleConvert()">Convert</button>
    `;

    if (state === 'loading') {
        html += `
        <div>
            <div id="prog-bar" style="height:6px;background:red;width:${progress}%"></div>
            <div id="prog-pct">${Math.round(progress)}%</div>
        </div>`;
    }

    if (state === 'done') {
        html += `
        <a href="/api/download/${fileId}" download>Download</a>
        <button onclick="handleReset()">New</button>`;
    }

    if (state === 'error') {
        html += `<div style="color:red">${escapeHtml(errorMsg)}</div>`;
    }

    document.getElementById('app').innerHTML = html;

    document.getElementById('url-input').addEventListener('input', e => {
        handleInput(e.target.value);
    });
}

// INIT
render();
</script>
